<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Capsule Review</title>
<style>
  /* Steam store palette, taken from the store's own dark chrome. */
  :root {
    --steam-bg: #1b2838;        /* store page background */
    --steam-chrome: #171a21;    /* header / footer chrome */
    --steam-panel: #16202d;     /* search result list background */
    --ink: #c7d5e0;             /* store body text */
    --ink-dim: #8f98a0;         /* secondary text */
    --blue: #66c0f4;            /* Steam link blue */
    --blue-deep: #417a9b;
    --line: rgba(0,0,0,.4);
    /* Capsule metrics: Steam renders the 231x87 asset at 184x69 in the list. */
    --cap-w: 184px;
    --cap-ratio: 231 / 87;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--steam-bg);
    color: var(--ink);
    font: 14px/1.4 "Motiva Sans", Arial, Helvetica, sans-serif;
  }
  a { color: var(--blue); }

  .chrome { background: var(--steam-chrome); border-bottom: 1px solid #000; }
  .wrap { max-width: 620px; margin: 0 auto; padding: 0 12px; }
  header .wrap { display: flex; align-items: baseline; gap: 10px; padding-top: 14px; padding-bottom: 12px; flex-wrap: wrap; }
  h1 { font-size: 17px; font-weight: 400; letter-spacing: .3px; color: #fff; margin: 0; text-transform: uppercase; }
  .tagline { color: var(--ink-dim); font-size: 12px; margin: 0; }

  /* Tabs, in the shape of the store's section tabs. */
  .tabs { display: flex; gap: 2px; }
  .tabs button {
    flex: 1 1 auto; appearance: none; cursor: pointer;
    font: inherit; font-size: 13px; text-transform: uppercase; letter-spacing: .5px;
    color: var(--ink-dim); background: rgba(0,0,0,.2); border: 0;
    padding: 11px 14px; border-bottom: 2px solid transparent;
  }
  .tabs button:hover { color: #fff; }
  .tabs button[aria-selected="true"] {
    color: #fff; border-bottom-color: var(--blue);
    background: linear-gradient(to bottom, rgba(102,192,244,.10), rgba(102,192,244,0));
  }

  main { padding: 14px 0 60px; }
  .bar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 8px 0 12px; color: var(--ink-dim); font-size: 12px;
  }
  .bar label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
  select, .btn {
    font: inherit; font-size: 12px; color: var(--ink);
    background: rgba(0,0,0,.3); border: 1px solid rgba(0,0,0,.5);
    border-radius: 2px; padding: 5px 8px; cursor: pointer;
  }
  .btn:hover, select:hover { color: #fff; background: var(--blue-deep); }
  .spacer { flex: 1 1 auto; }

  /* --- the capsule list: one column, mirroring Steam's search result rows --- */
  .list { background: var(--steam-panel); }
  .row {
    display: flex; align-items: center; gap: 12px;
    padding: 4px 8px; width: 100%; text-align: left;
    background: none; border: 0; border-bottom: 1px solid var(--line);
    color: inherit; font: inherit; cursor: pointer; text-decoration: none;
  }
  .row:nth-child(even) { background: rgba(0,0,0,.12); }
  .row:hover, .row:focus-visible {
    background: linear-gradient(to right, #2a475e, #1b2838);
    outline: none;
  }
  .row:hover .cap, .row:focus-visible .cap { box-shadow: 0 0 0 1px var(--blue); }
  .row:active { background: #1b2838; }
  .cap {
    flex: 0 0 auto; display: block;
    width: var(--cap-w); aspect-ratio: var(--cap-ratio);
    background: #000; object-fit: cover;
  }

  /* --- review tab --- */
  .rank {
    flex: 0 0 auto; width: 2.4em; text-align: right;
    color: var(--ink-dim); font-size: 13px;
  }
  .meta { min-width: 0; flex: 1 1 auto; }
  .rating { color: var(--blue); font-size: 13px; }
  .sub { color: var(--ink-dim); font-size: 11px; margin-top: 2px; }
  .note {
    display: block; width: calc(100% - 16px); margin: 6px 8px 10px;
    font: inherit; font-size: 12px; color: var(--ink);
    background: rgba(0,0,0,.3); border: 1px solid rgba(0,0,0,.5); border-radius: 2px;
    padding: 6px 8px; resize: vertical; min-height: 2.6em;
  }
  .note:focus { outline: 1px solid var(--blue-deep); }
  .entry { border-bottom: 1px solid var(--line); padding-bottom: 2px; }
  .entry .row { border-bottom: 0; }
  .empty { color: var(--ink-dim); padding: 30px 8px; text-align: center; font-size: 13px; }
  .hint { color: var(--ink-dim); font-size: 11px; padding: 10px 2px; }

  /* Mobile: keep one column, let the capsule use the width it can get.
     Steam's own list shrinks the capsule rather than reflowing. */
  @media (max-width: 520px) {
    :root { --cap-w: 42vw; }
    .row { gap: 8px; padding: 4px 6px; }
  }
</style>
</head>
<body>

<header class="chrome">
  <div class="wrap">
    <h1>Capsule Review</h1>
    <p class="tagline">Which Steam capsules work, and why.</p>
  </div>
  <div class="wrap">
    <div class="tabs" role="tablist">
      <button role="tab" id="tab-pick" aria-controls="panel-pick" aria-selected="true">Pick</button>
      <button role="tab" id="tab-review" aria-controls="panel-review" aria-selected="false">Review</button>
    </div>
  </div>
</header>

<main class="wrap">

  <section id="panel-pick" role="tabpanel" aria-labelledby="tab-pick">
    <div class="bar">
      <span id="pick-count"></span>
      <span class="spacer"></span>
      <button class="btn" id="skip">Skip set</button>
    </div>
    <div class="list" id="pick-list"></div>
    <p class="hint">Click the capsule you'd stop scrolling for. Your pick beats the other nine; a new set follows.</p>
  </section>

  <section id="panel-review" role="tabpanel" aria-labelledby="tab-review" hidden>
    <div class="bar">
      <label>Sort
        <select id="review-sort">
          <option value="rating">rating</option>
          <option value="wins">picks</option>
          <option value="recent">recently picked</option>
        </select>
      </label>
      <span class="spacer"></span>
      <button class="btn" id="export">Export</button>
      <button class="btn" id="reset">Clear ratings</button>
    </div>
    <div id="review-list"></div>
  </section>

</main>

const CDN = "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/";
const hasHi = new Set(HI);
const capsule1x = id => `${CDN}${id}/${CAP[id]}`;
// The 2x sibling is the same path with _2x before the extension (462x174) --
// including for alternate art, e.g. capsule_231x87_alt_assets_5_2x.jpg.
const capsule2x = id => hasHi.has(id) ? capsule1x(id).replace(/\.jpg$/, "_2x.jpg") : null;
const storeURL = id => `https://store.steampowered.com/app/${id}/`;

const SET_SIZE = 10;
const K = 24;                    // Elo step; ~24 keeps early picks meaningful
const BASE_RATING = 1500;
const STORE_KEY = "capsuleReview.v2";
const LEGACY_KEY = "capsuleReview.v1";

// What you rate is a piece of art, not an app. Steam reissues capsules, and a
// reissue changes the asset path -- so ratings are keyed by appid AND asset,
// and a reissued capsule starts over rather than inheriting a verdict passed
// on artwork that no longer exists.
const capKey = id => `${id}|${CAP[id]}`;

// ---------- persistence (localStorage only; no cookies, nothing leaves the browser)

const blank = () => ({ ratings: {}, settings: { sort: "rating" } });

function load() {
    try {
        const raw = localStorage.getItem(STORE_KEY);
        if (raw) return Object.assign(blank(), JSON.parse(raw));
        const legacy = localStorage.getItem(LEGACY_KEY);
        if (legacy) return migrate(JSON.parse(legacy));
        return blank();
    } catch (err) {
        console.warn("stored data unreadable, starting fresh", err);
        return blank();
    }
}

// v1 keyed ratings by appid alone. Carry them over against each app's current
// art -- the best available assumption, since v1 never recorded what was rated.
function migrate(old) {
    const db = blank();
    db.settings = Object.assign(db.settings, old.settings || {});
    for (const [id, r] of Object.entries(old.ratings || {})) {
        if (!CAP[id]) continue;
        db.ratings[capKey(id)] = Object.assign({ id: Number(id), cap: CAP[id] }, r);
    }
    console.info(`migrated ${Object.keys(db.ratings).length} ratings from v1`);
    return db;
}

let db = load();

function save() {
    try {
        localStorage.setItem(STORE_KEY, JSON.stringify(db));
    } catch (err) {
        console.warn("could not save", err);
    }
}

function record(id) {
    const key = capKey(id);
    let r = db.ratings[key];
    if (!r) {
        r = db.ratings[key] = {
            id, cap: CAP[id],       // exactly which art this verdict is about
            r: BASE_RATING, w: 0, l: 0, seen: 0, note: "", at: 0,
        };
    }
    return r;
}

// ---------- pool

// Capsules whose image 404s (delisted app, art reissued under a new hash) are
// dropped for the session so a dead row cannot keep coming back.
const dead = new Set();
const candidates = () => POOL.filter(id => !dead.has(id));

// Least-seen-first with jitter: every capsule earns comparisons before any
// gets a second look, but the order stays unpredictable.
function nextSet() {
    const pool = candidates();
    if (pool.length <= SET_SIZE) return pool.slice();
    const scored = pool.map(id => ({ id, k: (db.ratings[capKey(id)]?.seen || 0) + Math.random() * 1.6 }));
    scored.sort((a, b) => a.k - b.k);
    return scored.slice(0, SET_SIZE).map(s => s.id).sort(() => Math.random() - 0.5);
}

// ---------- Elo: the pick beats each of the other nine

function applyPick(winnerId, ids) {
    const win = record(winnerId);
    const losers = ids.filter(id => id !== winnerId).map(record);
    const before = win.r;
    let delta = 0;
    for (const lose of losers) {
        const expected = 1 / (1 + Math.pow(10, (lose.r - before) / 400));
        delta += K * (1 - expected);
        lose.r -= K * (1 - expected);
        lose.l += 1;
    }
    win.r = before + delta;
    win.w += 1;
    win.at = Date.now();
    for (const id of ids) record(id).seen += 1;
    save();
}

// ---------- rendering

// onDead runs when neither variant loads. The pick list uses it to backfill so
// the set is always SET_SIZE rows; without that, a 404 silently shrinks it.
function capsuleImg(id, onDead) {
    const img = document.createElement("img");
    img.className = "cap";
    img.src = capsule1x(id);
    const hi = capsule2x(id);
    if (hi) img.srcset = `${img.src} 1x, ${hi} 2x`;
    img.alt = `Steam capsule for app ${id}`;
    img.loading = "lazy";
    img.addEventListener("error", () => {
        // A failed srcset candidate does not fall back on its own: drop srcset
        // and let the 1x src try before writing the capsule off.
        if (img.srcset) {
            img.srcset = "";
            img.src = capsule1x(id);
            return;
        }
        dead.add(id);
        if (onDead) onDead(img);
        else img.closest(".row")?.remove();
    });
    return img;
}

// --- pick tab

const pickList = document.getElementById("pick-list");
let shown = [];

function renderPick() {
    shown = nextSet();
    pickList.replaceChildren();
    if (!shown.length) {
        pickList.innerHTML = '<p class="empty">No capsules in the pool. Run tools/fetch_capsules.py.</p>';
        return;
    }
    for (const id of shown) pickList.appendChild(pickRow(id));
}

function pickRow(id) {
    const row = document.createElement("button");
    row.className = "row";
    row.type = "button";
    row.append(capsuleImg(id, () => replaceRow(row, id)));
    row.addEventListener("click", () => {
        applyPick(id, shown);
        renderPick();
        updateCount();
        window.scrollTo({ top: 0, behavior: "smooth" });
    });
    return row;
}

// Swap a dead capsule for an unseen one in place, keeping the set at ten so a
// broken image cannot quietly turn a set of ten into a set of nine.
function replaceRow(row, deadId) {
    const pool = candidates().filter(id => !shown.includes(id));
    const slot = shown.indexOf(deadId);
    if (slot === -1) return;
    if (!pool.length) {           // nothing left to show: drop the row
        shown.splice(slot, 1);
        row.remove();
        updateCount();
        return;
    }
    const next = pool[Math.floor(Math.random() * pool.length)];
    shown[slot] = next;
    row.replaceWith(pickRow(next));
    updateCount();
}

function updateCount() {
    const picked = reviewed().length;
    document.getElementById("pick-count").textContent =
        `${picked} picked / ${candidates().length} in pool`;
}

// --- review tab

const reviewList = document.getElementById("review-list");
const inPool = new Set(POOL);

// A rating counts only while the art it was passed on is still the current
// art. Reissued capsules leave their old verdict behind rather than lending it
// to a new image.
const isCurrent = r => inPool.has(r.id) && CAP[r.id] === r.cap;

function reviewed() {
    return Object.values(db.ratings)
        .filter(r => r.w > 0 && isCurrent(r))
        .map(r => ({ id: r.id, r }));
}

const supersededCount = () =>
    Object.values(db.ratings).filter(r => r.w > 0 && !isCurrent(r)).length;

function renderReview() {
    const sort = db.settings.sort;
    const entries = reviewed().sort((a, b) =>
        sort === "wins" ? b.r.w - a.r.w :
        sort === "recent" ? b.r.at - a.r.at :
        b.r.r - a.r.r);

    reviewList.replaceChildren();
    const superseded = supersededCount();
    if (!entries.length) {
        reviewList.innerHTML = '<p class="empty">Nothing picked yet. Start on the Pick tab.</p>';
        if (superseded) reviewList.appendChild(supersededNote(superseded));
        return;
    }
    entries.forEach((e, i) => {
        const wrap = document.createElement("div");
        wrap.className = "entry list";

        const row = document.createElement("a");
        row.className = "row";
        row.href = storeURL(e.id);
        row.target = "_blank";
        row.rel = "noopener";

        const rank = document.createElement("span");
        rank.className = "rank";
        rank.textContent = i + 1;

        const meta = document.createElement("div");
        meta.className = "meta";
        const rating = document.createElement("div");
        rating.className = "rating";
        rating.textContent = `${Math.round(e.r.r)} · picked ${e.r.w}× of ${e.r.seen} shown`;
        const sub = document.createElement("div");
        sub.className = "sub";
        sub.textContent = `app ${e.id} — opens on Steam`;
        meta.append(rating, sub);

        // Keep the entry even if its art 404s -- the rating and note are still
        // yours, and the row still links to the store page.
        row.append(rank, capsuleImg(e.id, () => {}), meta);

        const note = document.createElement("textarea");
        note.className = "note";
        note.placeholder = "Why does this one work?";
        note.value = e.r.note || "";
        note.addEventListener("change", () => {
            record(e.id).note = note.value.trim();
            save();
        });

        wrap.append(row, note);
        reviewList.appendChild(wrap);
    });
    if (superseded) reviewList.appendChild(supersededNote(superseded));
}

function supersededNote(n) {
    const p = document.createElement("p");
    p.className = "hint";
    p.textContent = `${n} earlier ${n === 1 ? "rating is" : "ratings are"} set aside: ` +
        "Steam reissued that art, so the verdict no longer describes the capsule on the store.";
    return p;
}

// ---------- wiring

const tabs = {
    pick: { btn: document.getElementById("tab-pick"), panel: document.getElementById("panel-pick") },
    review: { btn: document.getElementById("tab-review"), panel: document.getElementById("panel-review") },
};

function showTab(name) {
    for (const [key, t] of Object.entries(tabs)) {
        const on = key === name;
        t.btn.setAttribute("aria-selected", String(on));
        t.panel.hidden = !on;
    }
    if (name === "review") renderReview();
    location.hash = name;
}

tabs.pick.btn.addEventListener("click", () => showTab("pick"));
tabs.review.btn.addEventListener("click", () => showTab("review"));

const sortSelect = document.getElementById("review-sort");
sortSelect.value = db.settings.sort;
sortSelect.addEventListener("change", () => {
    db.settings.sort = sortSelect.value;
    save();
    renderReview();
});

document.getElementById("skip").addEventListener("click", () => {
    for (const id of shown) record(id).seen += 1;   // skipped still counts as seen
    save();
    renderPick();
});

document.getElementById("export").addEventListener("click", () => {
    const rows = reviewed()
        .sort((a, b) => b.r.r - a.r.r)
        .map(e => ({
            appid: e.id,
            store: storeURL(e.id),
            capsule: `${CDN}${e.id}/${e.r.cap}`,   // the exact art this verdict is about
            rating: Math.round(e.r.r),
            picks: e.r.w,
            shown: e.r.seen,
            note: e.r.note || "",
        }));
    const blob = new Blob([JSON.stringify(rows, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "capsule-review.json";
    a.click();
    URL.revokeObjectURL(a.href);
});

document.getElementById("reset").addEventListener("click", () => {
    const n = Object.values(db.ratings).filter(r => r.w > 0).length;
    if (!confirm(`Delete every rating and note stored in this browser${n ? ` (${n} rated so far)` : ""}? This cannot be undone.`)) return;
    db = blank();
    // Drop the stored data outright rather than overwriting it with an empty
    // record, and take the pre-v2 key with it so nothing gets migrated back in.
    try {
        localStorage.removeItem(STORE_KEY);
        localStorage.removeItem(LEGACY_KEY);
    } catch (err) {
        console.warn("could not clear storage", err);
    }
    renderReview();
    renderPick();
    updateCount();
});

showTab(location.hash === "#review" ? "review" : "pick");
renderPick();
updateCount();
</script>
